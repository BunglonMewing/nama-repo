<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Instagram Downloader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f9f9f9, #e0e0e0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0095f6;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0077c2;
    }
    .result {
      margin-top: 20px;
      font-size: 14px;
      color: #444;
    }
    a.download-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #28a745;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    a.download-link:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Instagram Downloader</h1>
    <form action="/download" method="get">
      <input type="text" name="url" placeholder="Masukkan link IG" required>
      <button type="submit">Download</button>
    </form>
    <div class="result">
      <!-- Hasil download akan muncul di sini -->
    </div>
  </div>
</body>
</html>
